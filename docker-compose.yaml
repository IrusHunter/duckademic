version: "3.9"

services:

  api-gateway:
    build: ./api_gateway
    ports:
      - "10000:10000"
    depends_on:
      - employee-service
      - schedule-service
    env_file:
      - ./api_gateway/.env.docker
    environment:
    - DOCKER_ENV=true

  employee-service:
    build: ./services/employee
    expose:
      - "10001"
    env_file:
      - ./services/employee/.env.docker
    environment:
    - DOCKER_ENV=true
  
  schedule-service:
    build: ./services/schedule
    expose:
      - "10002"
    env_file:
      - ./services/schedule/.env.docker
    environment:
    - DOCKER_ENV=true
  